<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #ffdeeb; font-family: 'Arial', sans-serif; overflow: hidden; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; z-index: 1; }
        h1 { color: #ab18cf; font-size: 22px; margin-bottom: 20px; line-height: 1.5; }
        .buttons { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        button { padding: 12px 25px; font-size: 18px; border: none; border-radius: 15px; cursor: pointer; transition: all 0.3s ease; font-family: 'Khmer OS Metal Chrieng', serif; }
        #yesBtn { background-color: #ab18cf; color: white; }
        #noBtn { background-color: #f8f9fa; color: #333; position: relative; }
        video, img { border-radius: 15px; margin-bottom: 10px; max-width: 100%; }
        #finalImg { display: none; } 
    </style>
</head>
<body>

    <div class="container">
        <video id="mainVideo" width="300" autoplay loop muted playsinline>
            <source src="gift.gif.mp4" type="video/mp4">
        </video>
        
        <img id="finalImg" src="1.jpg" width="300" alt="Happy Face">
        
        <h1 id="question">តើអូនព្រមធ្វើជាប្រពន្ធបងទេ? អេនី ❤️</h1>
        
        <div class="buttons">
            <button id="yesBtn">ព្រម</button>
            <button id="noBtn">មិនព្រម</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const mainVideo = document.getElementById('mainVideo');
        const finalImg = document.getElementById('finalImg');

        // កែប្រែព័ត៌មាន Bot ថ្មីរបស់អ្នកនៅទីនេះ
        const telegramToken = '8444193368:AAHr0Z4DXBeG4IyyUPa-GGE5FD38c-veCCE';
        const chatId = '1781395582';

        yesBtn.addEventListener('click', () => {
            // ១. ប្តូរការបង្ហាញពី Video ទៅជា Image 2.jpg
            mainVideo.style.display = 'none';
            finalImg.style.display = 'block';
            
            question.innerHTML = "យេ! ចាប់ពីថ្ងៃនេះទៅអូនជាប្រពន្ធបងហើយណា! 🥰💍";
            document.querySelector('.buttons').style.display = 'none';

            // ២. ផ្ញើសារទៅ Telegram
            const message = "🔔 ដំណឹងពិសេស៖ អេនី បានចុច 'ព្រម' ហើយ! ❤️";
            const url = `https://api.telegram.org/bot${telegramToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

            // ប្រើ Fetch ដើម្បីផ្ញើទិន្នន័យ
            fetch(url, { mode: 'no-cors' })
                .then(() => console.log("សារបានផ្ញើទៅកាន់ Telegram!"))
                .catch(err => console.error("Error:", err));
        });

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('click', moveButton);

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            let currentFontSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentFontSize + 4) + 'px';
        }
    </script>
</body>
</html>
