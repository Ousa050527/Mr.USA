<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffdeeb; 
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            z-index: 1;
        }

        h1 {
            font-family: 'Khmer OS Muol Light', serif;
            color: #930ed1;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yesBtn {
            background-color: #8517df;
            color: white;
            font-family: 'Khmer OS Muol Light', serif;
        }

        #mustNoBtn {
            background-color: #ff4d4d; /* ប្តូរជាពណ៌ក្រហមឱ្យដឹងថាដាច់ខាត */
            color: white;
            font-family: 'Khmer OS Muol Light', serif;
        }

        #noBtn {
            background-color: #8517df;
            color: #e9e7e7;
            position: relative;
            font-family: 'Khmer OS Muol Light', serif;
        }

        img {
            width: 150px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="gift.gif" alt="Cute gif" id="mainImage">
        <h1 id="question">តើអូនព្រមធ្វើជាសង្សារបងទេ? ម្ចាស់ចិត្ត 😘❤️</h1>
        
        <div class="buttons">
            <button id="yesBtn">ព្រម</button>
            <button id="mustNoBtn">ដាច់ខាតមិនព្រម</button> 
            <button id="noBtn">មិនព្រម</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mustNoBtn = document.getElementById('mustNoBtn');
        const question = document.getElementById('question');
        const mainImage = document.getElementById('mainImage');

        const telegramToken = '8444193368:AAHr0Z4DXBeG4IyyUPa-GGE5FD38c-veCCE';
        const chatId = '1781395582';

        // មុខងារផ្ញើសារ
        function sendTelegram(message) {
            const url = `https://api.telegram.org/bot${telegramToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;
            fetch(url).catch(err => console.log("Error: ", err));
        }

        // ១. នៅពេលចុច Yes (ព្រម)
        yesBtn.addEventListener('click', () => {
            let name = prompt("សូមវាយឈ្មោះរបស់អ្នកសិន 🥰:"); 
            if (name == null || name == "") name = "នរណាម្នាក់";

            question.innerHTML = "យេ! ស្រឡាញ់គ្នាហើយណា " + name + "! 🥰";
            mainImage.src = "happy.gif"; // ប្រើរូបភាពសប្បាយ
            document.querySelector('.buttons').style.display = 'none';

            sendTelegram(`❤️ ដំណឹងល្អ! "${name}" បានចុចព្រម (Yes) ហើយ! 🥰`);
        });

        // ២. នៅពេលចុច Must No (ដាច់ខាតមិនព្រម)
        mustNoBtn.addEventListener('click', () => {
            let name = prompt("ចិត្តដាច់ម៉្លេះ! សុំស្គាល់ឈ្មោះអ្នកចិត្តដាច់ម្នាក់ហ្នឹងផង 😭:");
            if (name == null || name == "") name = "នរណាម្នាក់";

            question.innerHTML = "ហុីម... ចិត្តដាច់ម៉្លេះ " + name + "! 💔😭";
            mainImage.src = "sad.gif"; // ប្រើរូបភាពកើតទុក្ខ
            document.querySelector('.buttons').style.display = 'none';

            sendTelegram(`💔 ដំណឹងសោកសៅ! "${name}" បានចុច 'ដាច់ខាតមិនព្រម' (Must No) ហើយ... 😭`);
        });

        // ៣. ប៊ូតុង No រត់ចេញ
        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            let currentFontSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            if (currentFontSize < 60) { 
                yesBtn.style.fontSize = (currentFontSize + 3) + 'px';
            }
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('click', moveButton);
    </script>

</body>
</html>
